<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>XPEHb</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.5; }
        fieldset { margin-bottom: 20px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
        .flex { display: flex; gap: 20px; }
        .column { flex: 1; min-width: 300px; }
    </style>
</head>
<body>
    <h1>XPEHb</h1>

    <fieldset>
        <legend>1. Настройка метаданных</legend>
        <input type="text" id="newTypeName" placeholder="Новый тип">
        <button onclick="createType()">Добавить тип</button>
        <br><br>
        <select id="typeSelectForCat"></select>
        <input type="text" id="newCatName" placeholder="Новая категория">
        <button onclick="createCategory()">Добавить категорию</button>
    </fieldset>

    <fieldset>
        <legend>2. Загрузка файла</legend>
        <input type="file" id="fileInput">
        <div id="tagSelectors" style="margin: 10px 0; border: 1px solid #eee; padding: 10px; max-height: 150px; overflow-y: auto;">
            Загрузка категорий...
        </div>
        <button onclick="uploadFile()" id="uploadBtn">Загрузить в Облако и БД</button>
    </fieldset>

    <div class="flex">
        <div class="column">
            <h2>Файлы в БД (SQL)</h2>
            <button onclick="loadDbFiles()">Обновить</button>
            <table id="dbFilesTable">
                <thead>
                    <tr>
                        <th>id</th>
                        <th>Имя</th>
                        <th>Теги</th>
                        <th>Действие</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="column">
            <h2>Все файлы в MinIO</h2>
            <button onclick="loadMinioFiles()">Обновить</button>
            <ul id="minioFilesList"></ul>
        </div>
    </div>

    <script>
        let allMetadata = { types: [], cats: [] };

        async function loadMetadata() {
            try {
                const res = await fetch('/meta-data');
                allMetadata = await res.json();
                
                document.getElementById('typeSelectForCat').innerHTML = 
                    allMetadata.types.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

                const tagContainer = document.getElementById('tagSelectors');
                tagContainer.innerHTML = '<strong>Выберите категории:</strong><br>';
                allMetadata.cats.forEach(cat => {
                    const typeName = allMetadata.types.find(t => t.id === cat.typeMetadataId)?.name || '?';
                    tagContainer.innerHTML += `
                        <label style="display:block;">
                            <input type="checkbox" class="cat-checkbox" value="${cat.id}"> 
                            [${typeName}] ${cat.name}
                        </label>`;
                });
            } catch (e) { console.error("Ошибка метаданных:", e); }
        }

        async function createType() {
            const name = document.getElementById('newTypeName').value;
            if(!name) return;
            await fetch(`/types?name=${encodeURIComponent(name)}`, { method: 'POST' });
            loadMetadata();
        }

        async function createCategory() {
            const typeId = document.getElementById('typeSelectForCat').value;
            const name = document.getElementById('newCatName').value;
            if(!name) return;
            await fetch(`/categories?typeId=${typeId}&name=${encodeURIComponent(name)}`, { method: 'POST' });
            loadMetadata();
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert('Выберите файл');
            
            const file = fileInput.files[0];
            const checkedIds = Array.from(document.querySelectorAll('.cat-checkbox:checked')).map(cb => parseInt(cb.value));

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerText = 'Загрузка...';

            try {
                const response = await fetch('/uploadUrl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        FileName: file.name,
                        CategoryIds: checkedIds
                    })
                });
                if (!response.ok) throw new Error('Ошибка сервера при получении URL');
                const uploadUrl  = await response.json();

                const minioRes = await fetch(uploadUrl, {
                    method: 'PUT',
                    body: file
                });

                if (!minioRes.ok) {
                    const errorText = await minioRes.text();
                    console.error("MinIO Error:", errorText);
                    throw new Error('MinIO отклонил файл');
                }

                alert('Успешно загружено!');
                loadDbFiles();
                loadMinioFiles();
            } catch (e) {
                console.error(e);
                alert('Ошибка: ' + e.message + '. Подробности в консоли (F12).');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Загрузить в Облако и БД';
            }
        }

        async function loadDbFiles() {
            const res = await fetch('/files');
            const files = await res.json();
            const tbody = document.querySelector('#dbFilesTable tbody');
            tbody.innerHTML = files.map(f => `
                <tr>
                    <td>${f.id}</td>
                    <td>${f.name}</td>
                    <td>${(f.tags || []).map(t => `[${t.type}] ${t.cat}`).join(', ')}</td>
                    <td><button onclick="deleteFile('${f.id}')">Удалить</button><button onclick="downloadFile('${f.id}')">Скачать</button></td>
                </tr>
            `).join('');
        }

        async function loadMinioFiles() {
            const res = await fetch('/filesMinio');
            const files = await res.json();
            const list = document.getElementById('minioFilesList');
            list.innerHTML = files.map(f => `
                <li>
                    ${f.key} (${(f.size/1024).toFixed(1)} KB) 
                </li>
            `).join('');
        }

        async function deleteFile(id) {
            if (!confirm('Удалить?')) return;
            await fetch(`/delete?fileId=${encodeURIComponent(id)}`, { method: 'DELETE' });
            loadDbFiles();
            loadMinioFiles();
        }

        async function downloadFile(id) {
            window.location.href = `/download?fileId=${encodeURIComponent(id)}`;
        }

        loadMetadata();
        loadDbFiles();
        loadMinioFiles();
    </script>
</body>
</html>
