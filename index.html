<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>XPEHb (EF Core Web Test)</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.5; background-color: #f9f9f9; }
        fieldset { margin-bottom: 20px; padding: 15px; background: white; border: 1px solid #ccc; border-radius: 5px; }
        legend { font-weight: bold; background: #eee; padding: 2px 8px; border: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #e0e0e0; }
        .flex { display: flex; gap: 20px; flex-wrap: wrap; }
        .column { flex: 1; min-width: 400px; background: white; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .filter-row { display: flex; gap: 15px; margin-bottom: 10px; align-items: center; }
        .filter-row input, .filter-row select { padding: 5px; }
        .tag-badge { display: inline-block; background: #007bff; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; margin: 2px; }
        .tag-badge button { background: none; border: none; color: white; cursor: pointer; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>
    <h1>XPEHb - Тестовый интерфейс</h1>

    <fieldset>
        <legend>1. Настройка метаданных</legend>
        <input type="text" id="newTypeName" placeholder="Новый тип">
        <button onclick="createType()">Добавить тип</button>
        <br><br>
        <select id="typeSelectForCat"></select>
        <input type="text" id="newCatName" placeholder="Новая категория">
        <button onclick="createCategory()">Добавить категорию</button>
    </fieldset>

    <fieldset>
        <legend>2. Загрузка файла</legend>
        <input type="file" id="fileInput">
        <div id="tagSelectors" style="margin: 10px 0; border: 1px solid #eee; padding: 10px; max-height: 150px; overflow-y: auto;">
            Загрузка категорий...
        </div>
        <button onclick="uploadFile()" id="uploadBtn" style="padding: 10px; background: #28a745; color: white; border: none; cursor: pointer;">
            Загрузить в Облако и БД
        </button>
    </fieldset>

    <fieldset style="border-color: #007bff;">
        <legend>3. Поиск и Фильтрация (EF Core)</legend>
        
        <div class="filter-row">
            <label>Пагинация:</label>
            <input type="number" id="searchOffset" value="0" min="0" style="width: 70px;" title="С какой записи начать (Offset)">
            <input type="number" id="searchLimit" value="100" min="1" style="width: 70px;" title="Сколько записей взять (Limit)">
            
            <label style="margin-left: 20px;">Даты (UTC):</label>
            <input type="datetime-local" id="searchDateFrom" title="От">
            <input type="datetime-local" id="searchDateTo" title="До">
        </div>

        <div class="filter-row" style="background: #f1f8ff; padding: 10px; border-radius: 5px;">
            <label>Добавить фильтр по тегу (Условие И):</label>
            <select id="searchTagType"></select>
            <input type="text" id="searchTagCat" placeholder="Часть имени категории (напр. 'отчет')">
            <button onclick="addSearchTag()">Добавить</button>
        </div>
        <div id="activeSearchTags" style="margin-bottom: 10px;"></div>

        <button onclick="searchFiles()" style="padding: 8px 15px; background: #007bff; color: white; border: none; cursor: pointer; font-size: 16px;">
            Применить фильтры и найти
        </button>
    </fieldset>

    <div class="flex">
        <div class="column">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin: 0;">Файлы в БД</h2>
            </div>
            <table id="dbFilesTable">
                <thead>
                    <tr>
                        <th>id</th>
                        <th>Имя</th>
                        <th>Дата (UTC)</th>
                        <th>Теги</th>
                        <th>Действие</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="column" style="min-width: 300px;">
            <h2>Все файлы в MinIO</h2>
            <button onclick="loadMinioFiles()">Обновить MinIO</button>
            <ul id="minioFilesList"></ul>
        </div>
    </div>

    <script>
        let allMetadata = { types: [], cats: [] };
        let activeSearchTags =[]; // Массив для хранения выбранных тегов для поиска

        // === ИНИЦИАЛИЗАЦИЯ МЕТАДАННЫХ ===
        async function loadMetadata() {
            try {
                const res = await fetch('/meta-data');
                allMetadata = await res.json();
                
                const typeOptions = allMetadata.types.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
                document.getElementById('typeSelectForCat').innerHTML = typeOptions;
                document.getElementById('searchTagType').innerHTML = typeOptions; // Для поиска

                const tagContainer = document.getElementById('tagSelectors');
                tagContainer.innerHTML = '<strong>Выберите категории при загрузке:</strong><br>';
                allMetadata.cats.forEach(cat => {
                    const typeName = allMetadata.types.find(t => t.id === cat.typeMetadataId)?.name || '?';
                    tagContainer.innerHTML += `
                        <label style="display:block;">
                            <input type="checkbox" class="cat-checkbox" value="${cat.id}"> 
                            [${typeName}] ${cat.name}
                        </label>`;
                });
            } catch (e) { console.error("Ошибка метаданных:", e); }
        }

        // === СОЗДАНИЕ МЕТАДАННЫХ ===
        async function createType() {
            const name = document.getElementById('newTypeName').value;
            if(!name) return;
            await fetch(`/types?name=${encodeURIComponent(name)}`, { method: 'POST' });
            loadMetadata();
        }

        async function createCategory() {
            const typeId = document.getElementById('typeSelectForCat').value;
            const name = document.getElementById('newCatName').value;
            if(!name) return;
            await fetch(`/categories?typeId=${typeId}&name=${encodeURIComponent(name)}`, { method: 'POST' });
            loadMetadata();
        }

        // === ЗАГРУЗКА ФАЙЛА ===
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert('Выберите файл');
            
            const file = fileInput.files[0];
            const checkedIds = Array.from(document.querySelectorAll('.cat-checkbox:checked')).map(cb => parseInt(cb.value));

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerText = 'Загрузка...';

            try {
                const response = await fetch('/uploadUrl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ FileName: file.name, CategoryIds: checkedIds })
                });
                if (!response.ok) throw new Error('Ошибка сервера при получении URL');
                const uploadUrl  = await response.json();

                const minioRes = await fetch(uploadUrl, { method: 'PUT', body: file });

                if (!minioRes.ok) throw new Error('MinIO отклонил файл');

                alert('Успешно загружено!');
                searchFiles(); // Обновляем список файлов
                loadMinioFiles();
            } catch (e) {
                console.error(e);
                alert('Ошибка: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Загрузить в Облако и БД';
            }
        }

        // === УПРАВЛЕНИЕ ФИЛЬТРАМИ ===
        function addSearchTag() {
            const select = document.getElementById('searchTagType');
            const typeId = parseInt(select.value);
            const typeName = select.options[select.selectedIndex].text;
            const category = document.getElementById('searchTagCat').value.trim();

            if (!category) {
                alert("Введите часть названия категории для поиска");
                return;
            }

            activeSearchTags.push({ typeId, typeName, category });
            document.getElementById('searchTagCat').value = ''; // Очищаем поле
            renderSearchTags();
        }

        function removeSearchTag(index) {
            activeSearchTags.splice(index, 1);
            renderSearchTags();
        }

        function renderSearchTags() {
            const container = document.getElementById('activeSearchTags');
            if (activeSearchTags.length === 0) {
                container.innerHTML = '<span style="color:#888; font-size:12px;">Теги не выбраны (поиск по всем)</span>';
                return;
            }

            container.innerHTML = activeSearchTags.map((t, index) => `
                <div class="tag-badge">
                    [${t.typeName}] содержит "${t.category}"
                    <button onclick="removeSearchTag(${index})">×</button>
                </div>
            `).join('');
        }

        // === ПОИСК И ОТОБРАЖЕНИЕ ФАЙЛОВ ===
        async function searchFiles() {
            const offset = parseInt(document.getElementById('searchOffset').value) || 0;
            const limit = parseInt(document.getElementById('searchLimit').value) || 100;
            const dateFromRaw = document.getElementById('searchDateFrom').value;
            const dateToRaw = document.getElementById('searchDateTo').value;

            // Собираем Payload для POST /files/search
            const payload = {
                offset: offset,
                limit: limit,
                tags: activeSearchTags.map(t => ({ typeId: t.typeId, category: t.category }))
            };

            // Если даты выбраны, переводим их в ISO формат (UTC)
            if (dateFromRaw) payload.dateFrom = new Date(dateFromRaw).toISOString();
            if (dateToRaw) payload.dateTo = new Date(dateToRaw).toISOString();

            try {
                const res = await fetch('/files/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const files = await res.json();
                renderDbTable(files);
            } catch (e) {
                console.error("Ошибка поиска", e);
            }
        }

        function renderDbTable(files) {
            const tbody = document.querySelector('#dbFilesTable tbody');
            tbody.innerHTML = files.map(f => {
                const dateStr = f.lastUpdated ? new Date(f.lastUpdated).toLocaleString() : '—';
                const tagsHtml = (f.tags || []).map(t => `<span class="tag-badge" style="background:#6c757d;">[${t.type}] ${t.cat}</span>`).join(' ');
                
                return `
                <tr>
                    <td>${f.id}</td>
                    <td>${f.name}</td>
                    <td>${dateStr}</td>
                    <td>${tagsHtml}</td>
                    <td>
                        <button onclick="downloadFile('${f.id}')">Скачать</button>
                        <button onclick="deleteFile('${f.id}')" style="color:red;">Удалить</button>
                    </td>
                </tr>
            `}).join('');
        }

        // === MINIO И УДАЛЕНИЕ ===
        async function loadMinioFiles() {
            const res = await fetch('/filesMinio');
            const files = await res.json();
            const list = document.getElementById('minioFilesList');
            list.innerHTML = files.map(f => `<li>${f.key} (${(f.size/1024).toFixed(1)} KB)</li>`).join('');
        }

        async function deleteFile(id) {
            if (!confirm('Точно удалить?')) return;
            await fetch(`/delete?fileId=${encodeURIComponent(id)}`, { method: 'DELETE' });
            searchFiles();
            loadMinioFiles();
        }

        async function downloadFile(id) {
            window.location.href = `/download?fileId=${encodeURIComponent(id)}`;
        }

        // Запуск при загрузке страницы
        loadMetadata().then(() => {
            renderSearchTags();
            searchFiles(); 
            loadMinioFiles();
        });
    </script>
</body>
</html>
