<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPEHb</title>
    <style>
        /* === Цветовая палитра и переменные === */
        :root {
            --bg-color: #f3f4f6;
            --surface: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2828;
            --border: #e5e7eb;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        /* === Базовые стили === */
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 20px; 
            line-height: 1.5; 
            background-color: var(--bg-color); 
            color: var(--text-main);
        }
        
        h1 { font-size: 24px; color: #111827; margin-bottom: 24px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        h2 { font-size: 18px; color: #111827; margin-top: 0; }

        /* === Блоки (Fieldsets как карточки) === */
        fieldset { 
            margin-bottom: 24px; 
            padding: 24px; 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            box-shadow: var(--shadow);
            position: relative;
            margin-top: 20px;
        }
        legend { 
            font-weight: 600; 
            background: var(--primary); 
            color: white;
            padding: 6px 16px; 
            border-radius: 6px; 
            font-size: 14px;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
            position: absolute;
            top: -15px;
            left: 20px;
        }

        /* === Формы и инпуты === */
        input[type="text"], input[type="number"], input[type="datetime-local"], select, input[type="file"] {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #f9fafb;
            color: var(--text-main);
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background-color: #fff;
        }
        
        .input-group { margin-bottom: 15px; }

        /* === Кнопки === */
        button {
            padding: 8px 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:active { transform: translateY(1px); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: var(--success-hover); }
        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: var(--danger-hover); }
        .btn-large { padding: 10px 20px; font-size: 15px; width: 100%; margin-top: 10px;}

        /* === Таблицы === */
        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0;
            margin-top: 15px; 
            font-size: 14px; 
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        th, td { border-bottom: 1px solid var(--border); padding: 12px 16px; text-align: left; }
        th { background: #f8fafc; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 12px; }
        tr:last-child td { border-bottom: none; }
        tbody tr:hover { background-color: #f1f5f9; }
        
        /* Кнопки в таблице */
        td button { padding: 6px 12px; font-size: 12px; margin-right: 5px; }

        /* === Лейаут === */
        .flex { display: flex; gap: 24px; flex-wrap: wrap; }
        .column { 
            flex: 1; 
            min-width: 400px; 
            background: var(--surface); 
            padding: 24px; 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            box-shadow: var(--shadow);
        }

        /* === Фильтры и теги === */
        .filter-row { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        .filter-block { background: #f8fafc; padding: 15px; border-radius: var(--radius); border: 1px dashed var(--border); }
        
        .tag-badge { 
            display: inline-flex; 
            align-items: center;
            background: #e0e7ff; 
            color: #3730a3; 
            padding: 4px 10px; 
            border-radius: 999px; 
            font-size: 12px; 
            font-weight: 600;
            margin: 3px; 
        }
        .tag-badge button { 
            background: none; 
            color: #3730a3; 
            padding: 0; 
            margin-left: 8px; 
            font-size: 16px;
            font-weight: bold;
        }
        .tag-badge button:hover { color: var(--danger); background: none;}
        .tag-badge.db-tag { background: #e2e8f0; color: #475569; }

        /* Скролл-блок категорий */
        #tagSelectors { 
            margin: 15px 0; 
            border: 1px solid var(--border); 
            border-radius: 6px;
            padding: 12px; 
            max-height: 150px; 
            overflow-y: auto; 
            background: #f9fafb;
        }
        #tagSelectors label { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; font-size: 14px;}
        
        /* Список MinIO */
        #minioFilesList { list-style: none; padding: 0; margin-top: 15px; }
        #minioFilesList li { 
            padding: 10px; 
            border-bottom: 1px solid var(--border); 
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        #minioFilesList li:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <h1>XPEHb</h1>

    <fieldset>
        <legend>1. Настройка метаданных</legend>
        <div class="filter-row">
            <input type="text" id="newTypeName" placeholder="Новый тип (например: 'Документ')">
            <button onclick="createType()">Добавить тип</button>
        </div>
        <div class="filter-row">
            <select id="typeSelectForCat"></select>
            <input type="text" id="newCatName" placeholder="Новая категория">
            <button onclick="createCategory()">Добавить категорию</button>
        </div>
    </fieldset>

    <fieldset>
        <legend>2. Загрузка файла</legend>
        <input type="file" id="fileInput">
        <div id="tagSelectors">
            <span style="color: var(--text-muted);">Загрузка категорий...</span>
        </div>
        <button onclick="uploadFile()" id="uploadBtn" class="btn-success btn-large">
            Загрузить в Облако и БД
        </button>
    </fieldset>

    <fieldset style="border-color: var(--primary);">
        <legend style="background: var(--primary);">3. Поиск и Фильтрация (EF Core)</legend>
        
        <div class="filter-row">
            <label style="font-weight: 500;">Пагинация:</label>
            <input type="number" id="searchOffset" value="0" min="0" style="width: 80px;" title="С какой записи начать (Offset)">
            <input type="number" id="searchLimit" value="100" min="1" style="width: 80px;" title="Сколько записей взять (Limit)">
            
            <label style="margin-left: 20px; font-weight: 500;">Даты (UTC):</label>
            <input type="datetime-local" id="searchDateFrom" title="От">
            <input type="datetime-local" id="searchDateTo" title="До">
        </div>

        <div class="filter-row filter-block">
            <label style="font-weight: 500;">Добавить фильтр по тегу (Условие И):</label>
            <select id="searchTagType"></select>
            <input type="text" id="searchTagCat" placeholder="Часть имени (напр. 'отчет')">
            <button onclick="addSearchTag()">Добавить</button>
        </div>
        
        <div id="activeSearchTags" style="margin-bottom: 15px; min-height: 28px;"></div>

        <button onclick="searchFiles()" class="btn-large" style="margin-top: 0;">
            🔍 Применить фильтры и найти
        </button>
    </fieldset>

    <div class="flex">
        <div class="column" style="flex: 2;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Файлы в БД</h2>
            </div>
            <table id="dbFilesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя файла</th>
                        <th>Дата (UTC)</th>
                        <th>Теги</th>
                        <th style="width: 160px;">Действия</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="column" style="flex: 1; min-width: 300px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2>Сырой MinIO</h2>
                <button onclick="loadMinioFiles()" style="padding: 6px 12px; font-size: 12px;">🔄 Обновить</button>
            </div>
            <ul id="minioFilesList"></ul>
        </div>
    </div>

    <script>
        let allMetadata = { types: [], cats: [] };
        let activeSearchTags =[]; 

        // === ИНИЦИАЛИЗАЦИЯ МЕТАДАННЫХ ===
        async function loadMetadata() {
            try {
                const res = await fetch('/meta-data');
                allMetadata = await res.json();
                
                const typeOptions = allMetadata.types.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
                document.getElementById('typeSelectForCat').innerHTML = typeOptions;
                document.getElementById('searchTagType').innerHTML = typeOptions;

                const tagContainer = document.getElementById('tagSelectors');
                tagContainer.innerHTML = '<strong style="display:block; margin-bottom:8px; color:#374151;">Выберите категории при загрузке:</strong>';
                allMetadata.cats.forEach(cat => {
                    const typeName = allMetadata.types.find(t => t.id === cat.typeMetadataId)?.name || '?';
                    tagContainer.innerHTML += `
                        <label>
                            <input type="checkbox" class="cat-checkbox" value="${cat.id}"> 
                            <span><strong style="color:var(--primary);">[${typeName}]</strong> ${cat.name}</span>
                        </label>`;
                });
            } catch (e) { console.error("Ошибка метаданных:", e); }
        }

        // === СОЗДАНИЕ МЕТАДАННЫХ ===
        async function createType() {
            const name = document.getElementById('newTypeName').value;
            if(!name) return;
            await fetch(`/types?name=${encodeURIComponent(name)}`, { method: 'POST' });
            document.getElementById('newTypeName').value = '';
            loadMetadata();
        }

        async function createCategory() {
            const typeId = document.getElementById('typeSelectForCat').value;
            const name = document.getElementById('newCatName').value;
            if(!name) return;
            await fetch(`/categories?typeId=${typeId}&name=${encodeURIComponent(name)}`, { method: 'POST' });
            document.getElementById('newCatName').value = '';
            loadMetadata();
        }

        // === ЗАГРУЗКА ФАЙЛА ===
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert('Выберите файл');
            
            const file = fileInput.files[0];
            const checkedIds = Array.from(document.querySelectorAll('.cat-checkbox:checked')).map(cb => parseInt(cb.value));

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerText = '⏳ Загрузка...';

            try {
                const response = await fetch('/uploadUrl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ FileName: file.name, CategoryIds: checkedIds })
                });
                if (!response.ok) throw new Error('Ошибка сервера при получении URL');
                const uploadUrl  = await response.json();

                const minioRes = await fetch(uploadUrl, { method: 'PUT', body: file });

                if (!minioRes.ok) throw new Error('MinIO отклонил файл');

                alert('✅ Успешно загружено!');
                fileInput.value = ''; // сброс файла
                searchFiles(); 
                loadMinioFiles();
            } catch (e) {
                console.error(e);
                alert('❌ Ошибка: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Загрузить в Облако и БД';
            }
        }

        // === УПРАВЛЕНИЕ ФИЛЬТРАМИ ===
        function addSearchTag() {
            const select = document.getElementById('searchTagType');
            const typeId = parseInt(select.value);
            const typeName = select.options[select.selectedIndex].text;
            const category = document.getElementById('searchTagCat').value.trim();

            if (!category) {
                alert("Введите часть названия категории для поиска");
                return;
            }

            activeSearchTags.push({ typeId, typeName, category });
            document.getElementById('searchTagCat').value = ''; 
            renderSearchTags();
        }

        function removeSearchTag(index) {
            activeSearchTags.splice(index, 1);
            renderSearchTags();
        }

        function renderSearchTags() {
            const container = document.getElementById('activeSearchTags');
            if (activeSearchTags.length === 0) {
                container.innerHTML = '<span style="color:var(--text-muted); font-size:13px; font-style:italic;">Теги не выбраны (поиск по всем файлам)</span>';
                return;
            }

            container.innerHTML = activeSearchTags.map((t, index) => `
                <div class="tag-badge">
                    [${t.typeName}] содержит "${t.category}"
                    <button onclick="removeSearchTag(${index})" title="Удалить фильтр">×</button>
                </div>
            `).join('');
        }

        // === ПОИСК И ОТОБРАЖЕНИЕ ФАЙЛОВ ===
        async function searchFiles() {
            const offset = parseInt(document.getElementById('searchOffset').value) || 0;
            const limit = parseInt(document.getElementById('searchLimit').value) || 100;
            const dateFromRaw = document.getElementById('searchDateFrom').value;
            const dateToRaw = document.getElementById('searchDateTo').value;

            // Формируем параметры для GET-запроса
            const params = new URLSearchParams();
            params.append('offset', offset);
            params.append('limit', limit);

            if (dateFromRaw) params.append('dateFrom', new Date(dateFromRaw).toISOString());
            if (dateToRaw) params.append('dateTo', new Date(dateToRaw).toISOString());

            // Если есть теги, запаковываем их в JSON-строку
            const tags = activeSearchTags.map(t => ({ typeId: t.typeId, category: t.category }));
            if (tags.length > 0) {
                params.append('tagsJson', JSON.stringify(tags));
            }

            try {
                // Теперь это GET-запрос к эндпоинту /files с параметрами
                const res = await fetch(`/files?${params.toString()}`);
                
                if (!res.ok) throw new Error('Ошибка сервера');
                
                const files = await res.json();
                renderDbTable(files);
            } catch (e) {
                console.error("Ошибка поиска", e);
            }
        }

        function renderDbTable(files) {
            const tbody = document.querySelector('#dbFilesTable tbody');
            
            if (files.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted); padding: 20px;">Файлы не найдены</td></tr>';
                return;
            }

            tbody.innerHTML = files.map(f => {
                const dateStr = f.lastUpdated ? new Date(f.lastUpdated).toLocaleString() : '—';
                const tagsHtml = (f.tags || []).map(t => `<span class="tag-badge db-tag">[${t.type}] ${t.cat}</span>`).join(' ');
                
                return `
                <tr>
                    <td style="color: var(--text-muted); font-size: 12px;">${f.id}</td>
                    <td style="font-weight: 500;">${f.name}</td>
                    <td style="font-size: 13px;">${dateStr}</td>
                    <td>${tagsHtml}</td>
                    <td>
                        <button onclick="downloadFile('${f.id}')">Скачать</button>
                        <button class="btn-danger" onclick="deleteFile('${f.id}')">Удалить</button>
                    </td>
                </tr>
            `}).join('');
        }

        // === MINIO И УДАЛЕНИЕ ===
        async function loadMinioFiles() {
            try {
                const res = await fetch('/filesMinio');
                const files = await res.json();
                const list = document.getElementById('minioFilesList');
                
                if (files.length === 0) {
                    list.innerHTML = '<li style="color:var(--text-muted); justify-content:center;">Корзина пуста</li>';
                    return;
                }

                list.innerHTML = files.map(f => `
                    <li>
                        <span style="word-break: break-all;">📄 ${f.key}</span>
                        <span style="color: var(--text-muted); white-space: nowrap; margin-left: 10px;">${(f.size/1024).toFixed(1)} KB</span>
                    </li>
                `).join('');
            } catch(e) {
                 console.error("Ошибка загрузки Minio:", e);
            }
        }

        async function deleteFile(id) {
            if (!confirm('Вы уверены, что хотите безвозвратно удалить файл?')) return;
            await fetch(`/delete?fileId=${encodeURIComponent(id)}`, { method: 'DELETE' });
            searchFiles();
            loadMinioFiles();
        }

        async function downloadFile(id) {
            window.location.href = `/download?fileId=${encodeURIComponent(id)}`;
        }

        // Запуск при загрузке страницы
        loadMetadata().then(() => {
            renderSearchTags();
            searchFiles(); 
            loadMinioFiles();
        });
    </script>
</body>
</html>
