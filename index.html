<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPEHb</title>
    <style>
        /* === Цветовая палитра и переменные === */
        :root {
            --bg-color: #f3f4f6;
            --surface: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2828;
            --border: #e5e7eb;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        /* === Базовые стили === */
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 20px; 
            line-height: 1.5; 
            background-color: var(--bg-color); 
            color: var(--text-main);
        }
        
        h1 { font-size: 24px; color: #111827; margin-bottom: 24px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        h2 { font-size: 18px; color: #111827; margin-top: 0; }

        /* === Блоки (Fieldsets как карточки) === */
        fieldset { 
            margin-bottom: 24px; 
            padding: 24px; 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            box-shadow: var(--shadow);
            position: relative;
            margin-top: 20px;
        }
        legend { 
            font-weight: 600; 
            background: var(--primary); 
            color: white;
            padding: 6px 16px; 
            border-radius: 6px; 
            font-size: 14px;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
            position: absolute;
            top: -15px;
            left: 20px;
        }

        /* === Формы и инпуты === */
        input[type="text"], input[type="number"], input[type="datetime-local"], select, input[type="file"] {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #f9fafb;
            color: var(--text-main);
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background-color: #fff;
        }
        
        .input-group { margin-bottom: 15px; }

        /* === Кнопки === */
        button {
            padding: 8px 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:active { transform: translateY(1px); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: var(--success-hover); }
        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: var(--danger-hover); }
        .btn-large { padding: 10px 20px; font-size: 15px; width: 100%; margin-top: 10px;}

        /* === Таблицы === */
        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0;
            margin-top: 15px; 
            font-size: 14px; 
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        th, td { border-bottom: 1px solid var(--border); padding: 12px 16px; text-align: left; }
        th { background: #f8fafc; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 12px; }
        tr:last-child td { border-bottom: none; }
        tbody tr:hover { background-color: #f1f5f9; }
        
        /* Кнопки в таблице */
        td button { padding: 6px 12px; font-size: 12px; margin-right: 5px; }

        /* === Лейаут === */
        .flex { display: flex; gap: 24px; flex-wrap: wrap; }
        .column { 
            flex: 1; 
            min-width: 400px; 
            background: var(--surface); 
            padding: 24px; 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            box-shadow: var(--shadow);
        }

        /* === Фильтры и теги === */
        .filter-row { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        .filter-block { background: #f8fafc; padding: 15px; border-radius: var(--radius); border: 1px dashed var(--border); }
        
        .tag-badge { 
            display: inline-flex; 
            align-items: center;
            background: #e0e7ff; 
            color: #3730a3; 
            padding: 4px 10px; 
            border-radius: 999px; 
            font-size: 12px; 
            font-weight: 600;
            margin: 3px; 
        }
        .tag-badge button { 
            background: none; 
            color: #3730a3; 
            padding: 0; 
            margin-left: 8px; 
            font-size: 16px;
            font-weight: bold;
        }
        .tag-badge button:hover { color: var(--danger); background: none;}
        .tag-badge.db-tag { background: #e2e8f0; color: #475569; }

        /* Скролл-блок категорий */
        #tagSelectors { 
            margin: 15px 0; 
            border: 1px solid var(--border); 
            border-radius: 6px;
            padding: 12px; 
            max-height: 150px; 
            overflow-y: auto; 
            background: #f9fafb;
        }
        #tagSelectors label { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; font-size: 14px;}
        
        /* Список MinIO */
        #minioFilesList { list-style: none; padding: 0; margin-top: 15px; }
        #minioFilesList li { 
            padding: 10px; 
            border-bottom: 1px solid var(--border); 
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        #minioFilesList li:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <h1>XPEHb</h1>

    <div class="flex">
        <div class="column" style="flex: 1;">
            <h2>Управление типами и категориями</h2>
            <div class="input-group">
                <label><strong>Новый тип:</strong></label>
                <input type="text" id="newTypeName" placeholder="Например: 'Документ'">
                <button onclick="createType()" class="btn-success" style="width: 100%; margin-top: 8px;">Добавить тип</button>
            </div>
            
            <div class="input-group" style="margin-top: 20px;">
                <label><strong>Новая категория:</strong></label>
                <select id="typeSelectForCat"></select>
                <input type="text" id="newCatName" placeholder="Например: 'Договор'" style="margin-top: 8px;">
                <button onclick="createCategory()" style="width: 100%; margin-top: 8px;">Добавить категорию</button>
            </div>
        </div>

        <div class="column" style="flex: 1;">
            <h2>Создание шаблона</h2>
            <div class="input-group">
                <label><strong>Имя шаблона:</strong></label>
                <input type="text" id="templateNameInput" placeholder="Например: 'Шаблон отчета'">
            </div>

            <div id="templateTypesSelector" style="border: 1px solid var(--border); border-radius: 6px; padding: 12px; background: #f9fafb; margin-bottom: 15px; max-height: 150px; overflow-y: auto;">
                <span style="color: var(--text-muted); font-size: 13px;">Выбирайте типы...</span>
            </div>

            <button onclick="createNewTemplate()" class="btn-success" style="width: 100%;">Создать шаблон</button>
        </div>
    </div>
        <div class="input-group">
            <label for="templateSelect"><strong>Выберите шаблон:</strong></label>
            <select id="templateSelect" onchange="loadTemplateFields()">
                <option value="">-- Загрузка шаблонов --</option>
            </select>
        </div>

        <input type="file" id="fileInput" style="margin-bottom: 15px;">
        
        <div id="templateFieldsContainer" style="border: 1px solid var(--border); border-radius: 6px; padding: 15px; background: #f9fafb; margin-bottom: 15px; display: none;">
            <strong style="display: block; margin-bottom: 12px; color: var(--text-main);">Заполните поля шаблона:</strong>
            <div id="templateFieldsContent"></div>
        </div>

        <button onclick="uploadFileWithTemplate()" id="uploadBtn" class="btn-success btn-large">
            Загрузить в Облако и БД
        </button>
    </fieldset>

    <fieldset style="border-color: var(--primary);">
        <legend style="background: var(--primary);">3. Поиск и Фильтрация (EF Core)</legend>
        
        <div class="filter-row">
            <label style="font-weight: 500;">Пагинация:</label>
            <input type="number" id="searchOffset" value="0" min="0" style="width: 80px;" title="С какой записи начать (Offset)">
            <input type="number" id="searchLimit" value="100" min="1" style="width: 80px;" title="Сколько записей взять (Limit)">
            
            <label style="margin-left: 20px; font-weight: 500;">Даты (UTC):</label>
            <input type="datetime-local" id="searchDateFrom" title="От">
            <input type="datetime-local" id="searchDateTo" title="До">
        </div>

        <div class="filter-row filter-block">
            <label style="font-weight: 500;">Добавить фильтр по тегу (Условие И):</label>
            <select id="searchTagType"></select>
            <input type="text" id="searchTagCat" placeholder="Часть имени (напр. 'отчет')">
            <button onclick="addSearchTag()">Добавить</button>
        </div>
        
        <div id="activeSearchTags" style="margin-bottom: 15px; min-height: 28px;"></div>

        <button onclick="searchFiles()" class="btn-large" style="margin-top: 0;">
            🔍 Применить фильтры и найти
        </button>
    </fieldset>

    <div class="flex">
        <div class="column" style="flex: 2;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Файлы в БД</h2>
            </div>
            <table id="dbFilesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя файла</th>
                        <th>Дата (UTC)</th>
                        <th>Теги</th>
                        <th style="width: 160px;">Действия</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="column" style="flex: 1; min-width: 300px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2>Сырой MinIO</h2>
                <button onclick="loadMinioFiles()" style="padding: 6px 12px; font-size: 12px;">🔄 Обновить</button>
            </div>
            <ul id="minioFilesList"></ul>
        </div>
    </div>

    <script>
        let allMetadata = [];
        let activeSearchTags = [];
        let currentTemplate = null;

        // === ИНИЦИАЛИЗАЦИЯ ШАБЛОНОВ И МЕТАДАННЫХ ===
        async function loadMetadata() {
            try {
                const res = await fetch('/meta-data');
                allMetadata = await res.json();
                
                // Обновляем выбор типов для форм
                const typeOptions = allMetadata.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
                document.getElementById('typeSelectForCat').innerHTML = typeOptions;
                document.getElementById('searchTagType').innerHTML = typeOptions;

                // Обновляем селектор типов для создания шаблона
                renderTemplateTypesSelector();

                await loadTemplates();
            } catch (e) { console.error("Ошибка метаданных:", e); }
        }

        function renderTemplateTypesSelector() {
            const container = document.getElementById('templateTypesSelector');
            if (!allMetadata || allMetadata.length === 0) {
                container.innerHTML = '<span style="color:var(--text-muted);">Нет доступных типов</span>';
                return;
            }

            container.innerHTML = '<strong style="display:block; margin-bottom:8px; color:#374151;">Выберите типы для шаблона:</strong>' +
                allMetadata.map(type => `
                    <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer;">
                        <input type="checkbox" class="template-type-checkbox" value="${type.id}">
                        <span>${type.name}</span>
                    </label>
                `).join('');
        }

        async function loadTemplates() {
            try {
                const res = await fetch('/templates');
                const templates = await res.json();
                
                const select = document.getElementById('templateSelect');
                select.innerHTML = '<option value="">-- Выберите шаблон --</option>' + 
                    templates.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            } catch (e) { console.error("Ошибка загрузки шаблонов:", e); }
        }

        async function loadTemplateFields() {
            const templateId = document.getElementById('templateSelect').value;
            const container = document.getElementById('templateFieldsContainer');
            const fieldsContent = document.getElementById('templateFieldsContent');

            if (!templateId) {
                container.style.display = 'none';
                currentTemplate = null;
                return;
            }

            try {
                const res = await fetch(`/templates/${templateId}`);
                currentTemplate = await res.json();
                
                let html = '';
                currentTemplate.fields.forEach(field => {
                    const options = field.values.map(v => 
                        `<option value="${v.id}">${v.name}</option>`
                    ).join('');
                    
                    html += `
                        <div class="input-group">
                            <label><strong>${field.keyName}:</strong></label>
                            <select class="template-field" data-key-id="${field.keyId}">
                                <option value="">-- Выберите --</option>
                                ${options}
                            </select>
                        </div>
                    `;
                });
                
                fieldsContent.innerHTML = html;
                container.style.display = 'block';
            } catch (e) {
                console.error("Ошибка загрузки шаблона:", e);
                alert('❌ Ошибка загрузки шаблона');
            }
        }

        // === СОЗДАНИЕ МЕТАДАННЫХ ===
        async function createType() {
            const name = document.getElementById('newTypeName').value;
            if(!name) return alert('Введите имя типа');
            
            try {
                await fetch(`/types?name=${encodeURIComponent(name)}`, { method: 'POST' });
                document.getElementById('newTypeName').value = '';
                await loadMetadata();
                alert('✅ Тип создан');
            } catch (e) {
                console.error(e);
                alert('❌ Ошибка: ' + e.message);
            }
        }

        async function createCategory() {
            const typeId = document.getElementById('typeSelectForCat').value;
            const name = document.getElementById('newCatName').value;
            if(!name) return alert('Введите имя категории');
            
            try {
                await fetch(`/categories?typeId=${typeId}&name=${encodeURIComponent(name)}`, { method: 'POST' });
                document.getElementById('newCatName').value = '';
                await loadMetadata();
                alert('✅ Категория создана');
            } catch (e) {
                console.error(e);
                alert('❌ Ошибка: ' + e.message);
            }
        }

        async function createNewTemplate() {
            const name = document.getElementById('templateNameInput').value.trim();
            if (!name) return alert('Введите имя шаблона');

            const selectedKeyIds = Array.from(
                document.querySelectorAll('.template-type-checkbox:checked')
            ).map(cb => parseInt(cb.value));

            if (selectedKeyIds.length === 0) {
                return alert('Выберите хотя бы один тип для шаблона');
            }

            try {
                const response = await fetch('/templates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        keyIds: selectedKeyIds
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Ошибка создания шаблона');
                }

                document.getElementById('templateNameInput').value = '';
                document.querySelectorAll('.template-type-checkbox').forEach(cb => cb.checked = false);
                renderTemplateTypesSelector();
                await loadTemplates();
                alert('✅ Шаблон успешно создан!');
            } catch (e) {
                console.error(e);
                alert('❌ Ошибка: ' + e.message);
            }
        }

        // === ЗАГРУЗКА ФАЙЛА С ШАБЛОНОМ ===
        async function uploadFileWithTemplate() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert('Выберите файл');
            
            const templateId = document.getElementById('templateSelect').value;
            if (!templateId) return alert('Выберите шаблон');

            if (!currentTemplate) return alert('Шаблон не загружен');

            // Собираем выбранные значения
            const selectedValues = {};
            document.querySelectorAll('.template-field').forEach(field => {
                const valueId = parseInt(field.value);
                if (!valueId) {
                    alert(`Выберите значение для поля "${field.parentElement.querySelector('label').textContent}"`);
                    throw new Error('Не все поля заполнены');
                }
                selectedValues[field.dataset.keyId] = valueId;
            });

            const file = fileInput.files[0];
            const valueIds = Object.values(selectedValues);

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerText = '⏳ Загрузка...';

            try {
                const response = await fetch('/uploadUrl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ FileName: file.name, ValueIds: valueIds })
                });
                if (!response.ok) throw new Error('Ошибка сервера при получении URL');
                const { id, uploadUrl } = await response.json();

                const minioRes = await fetch(uploadUrl, { method: 'PUT', body: file });
                if (!minioRes.ok) throw new Error('MinIO отклонил файл');

                alert('✅ Успешно загружено!');
                fileInput.value = '';
                document.getElementById('templateSelect').value = '';
                document.getElementById('templateFieldsContainer').style.display = 'none';
                searchFiles(); 
                loadMinioFiles();
            } catch (e) {
                console.error(e);
                alert('❌ Ошибка: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Загрузить в Облако и БД';
            }
        }

        // === УПРАВЛЕНИЕ ФИЛЬТРАМИ ===
        function addSearchTag() {
            const select = document.getElementById('searchTagType');
            const keyId = parseInt(select.value);
            const typeName = select.options[select.selectedIndex].text;
            const value = document.getElementById('searchTagCat').value.trim();

            if (!value) {
                alert("Введите часть названия категории для поиска");
                return;
            }

            activeSearchTags.push({ keyId, typeName, value });
            document.getElementById('searchTagCat').value = ''; 
            renderSearchTags();
        }

        function removeSearchTag(index) {
            activeSearchTags.splice(index, 1);
            renderSearchTags();
        }

        function renderSearchTags() {
            const container = document.getElementById('activeSearchTags');
            if (activeSearchTags.length === 0) {
                container.innerHTML = '<span style="color:var(--text-muted); font-size:13px; font-style:italic;">Теги не выбраны (поиск по всем файлам)</span>';
                return;
            }

            container.innerHTML = activeSearchTags.map((t, index) => `
                <div class="tag-badge">
                    [${t.typeName}] содержит "${t.value}"
                    <button onclick="removeSearchTag(${index})" title="Удалить фильтр">×</button>
                </div>
            `).join('');
        }

        // === ПОИСК И ОТОБРАЖЕНИЕ ФАЙЛОВ ===
        async function searchFiles() {
            const offset = parseInt(document.getElementById('searchOffset').value) || 0;
            const limit = parseInt(document.getElementById('searchLimit').value) || 100;
            const dateFromRaw = document.getElementById('searchDateFrom').value;
            const dateToRaw = document.getElementById('searchDateTo').value;

            const params = new URLSearchParams();
            params.append('offset', offset);
            params.append('limit', limit);

            if (dateFromRaw) params.append('dateFrom', new Date(dateFromRaw).toISOString());
            if (dateToRaw) params.append('dateTo', new Date(dateToRaw).toISOString());

            const tags = activeSearchTags.map(t => ({ keyId: t.keyId, value: t.value }));
            if (tags.length > 0) {
                params.append('tagsJson', JSON.stringify(tags));
            }

            try {
                const res = await fetch(`/files?${params.toString()}`);
                if (!res.ok) throw new Error('Ошибка сервера');
                const files = await res.json();
                renderDbTable(files);
            } catch (e) {
                console.error("Ошибка поиска", e);
            }
        }

        function renderDbTable(files) {
            const tbody = document.querySelector('#dbFilesTable tbody');
            
            if (files.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted); padding: 20px;">Файлы не найдены</td></tr>';
                return;
            }

            tbody.innerHTML = files.map(f => {
                const dateStr = f.lastUpdated ? new Date(f.lastUpdated).toLocaleString() : '—';
                const tagsHtml = (f.tags || []).map(t => `<span class="tag-badge db-tag">[${t.key}] ${t.value}</span>`).join(' ');
                
                return `
                <tr>
                    <td style="color: var(--text-muted); font-size: 12px;">${f.id}</td>
                    <td style="font-weight: 500;">${f.name}</td>
                    <td style="font-size: 13px;">${dateStr}</td>
                    <td>${tagsHtml}</td>
                    <td>
                        <button onclick="downloadFile('${f.id}')">Скачать</button>
                        <button class="btn-danger" onclick="deleteFile('${f.id}')">Удалить</button>
                    </td>
                </tr>
            `}).join('');
        }

        // === MINIO И УДАЛЕНИЕ ===
        async function loadMinioFiles() {
            try {
                const res = await fetch('/filesMinio');
                const files = await res.json();
                const list = document.getElementById('minioFilesList');
                
                if (files.length === 0) {
                    list.innerHTML = '<li style="color:var(--text-muted); justify-content:center;">Корзина пуста</li>';
                    return;
                }

                list.innerHTML = files.map(f => `
                    <li>
                        <span style="word-break: break-all;">📄 ${f.key}</span>
                        <span style="color: var(--text-muted); white-space: nowrap; margin-left: 10px;">${(f.size/1024).toFixed(1)} KB</span>
                    </li>
                `).join('');
            } catch(e) {
                console.error("Ошибка загрузки Minio:", e);
            }
        }

        async function deleteFile(id) {
            if (!confirm('Вы уверены, что хотите безвозвратно удалить файл?')) return;
            await fetch(`/delete?fileId=${encodeURIComponent(id)}`, { method: 'DELETE' });
            searchFiles();
            loadMinioFiles();
        }

        async function downloadFile(id) {
            window.location.href = `/download?fileId=${encodeURIComponent(id)}`;
        }

        // Запуск при загрузке страницы
        loadMetadata().then(() => {
            renderSearchTags();
            searchFiles(); 
            loadMinioFiles();
        });
    </script>
</body>
</html>
