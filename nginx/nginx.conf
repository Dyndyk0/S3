user  nginx;
worker_processes auto;
worker_priority -20;

error_log  /var/log/nginx/error.log;
pid        /var/run/nginx.pid;

events {
    worker_connections  4000;
}

http {
    server {
        listen 8080;
        resolver 127.0.0.11 valid=5s ipv6=off;

        ignore_invalid_headers off;
        
        # Разрешаем загрузку файлов любого размера
        client_max_body_size 0;
        proxy_buffering off;
        proxy_redirect off;

        set $server http://server:8080;

        location /server {
            rewrite ^/server$ / break;
            rewrite ^/server/(.*) /$1 break;
            proxy_pass $server;
        }

        set $minio_port ${MINIO_PORT};
        set $minio_host ${MINIO_HOST};
        set $minio_url http://$minio_host:$minio_port;

        location ~* ^/minio-api(.*) {
            proxy_set_header Host $minio_host:$minio_port;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 300;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;

            rewrite ^/minio-api(.*) $1 break;
            proxy_pass $minio_url;
        }
    }
}