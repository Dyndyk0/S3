<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPEHb - Управление файлами и метаданными</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- === ЛЕВАЯ БОКОВАЯ ПАНЕЛЬ === -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>XPEHb</h1>
        </div>

        <div class="sidebar-content">
            <div class="sidebar-section">
                <h3>Разделы</h3>
                <div class="sidebar-nav">
                    <button class="tab active" data-tab="templates">🧩 Шаблоны</button>
                    <button class="tab" data-tab="keys">🔑 Ключи метаданных</button>
                    <button class="tab" data-tab="values">🧾 Значения метаданных</button>
                    <button class="tab" data-tab="files">📁 Файлы</button>
                    <button class="tab" data-tab="upload">📤 Загрузка</button>
                    <button class="tab" data-tab="minio">☁️ MinIO</button>
                </div>
            </div>
        </div>
    </div>

    <!-- === ОСНОВНОЕ СОДЕРЖИМОЕ === -->
    <div class="main-content">
        <!-- === СОДЕРЖИМОЕ ВКЛАДОК === -->
        <div class="content">

            <!-- === ВКЛ.0: ШАБЛОНЫ === -->
            <div id="tab-templates" class="tab-content active">
                <div class="card">
                    <h2>Шаблоны</h2>
                    <div class="filter-block">
                        <h3 style="margin-top: 0;">Поиск по ключам и значениям</h3>
                        <div class="search-input-group">
                            <input type="text" placeholder="Поиск ключей / значений..." 
                                onkeyup="APP.searchInTags(this.value)">
                            <input type="text" placeholder="Поиск шаблонов..." 
                                onkeyup="APP.searchInTemplates(this.value)">
                        </div>
                        <div id="tagsSearchResults"></div>
                    </div>
                </div>

                <div class="card">
                    <h3>Создание шаблона</h3>
                    <div class="input-group">
                        <label>Имя шаблона</label>
                        <input type="text" id="templateNameInput" placeholder="Имя шаблона">
                    </div>
                    <div class="scroll-container" id="templateTypesSelector">
                        <span style="color: var(--text-muted); font-size: 13px;">Выбирайте ключи...</span>
                    </div>
                    <button class="btn-success btn-block" onclick="APP.createTemplate()">Создать шаблон</button>
                </div>
            </div>

            <!-- === ВКЛ.1: КЛЮЧИ МЕТАДАННЫХ === -->
            <div id="tab-keys" class="tab-content">
                <div class="card">
                    <h2>Ключи метаданных</h2>
                    <div class="input-group">
                        <label>Поиск ключей</label>
                        <input type="text" id="keySearchInput" placeholder="Введите часть имени" onkeyup="APP.searchKeys(this.value)">
                    </div>
                    <div class="input-group">
                        <label>Новый ключ</label>
                        <input type="text" id="newKeyName" placeholder="Имя ключа">
                        <button class="btn-success btn-block" onclick="APP.createKeyMetadata()">Добавить ключ</button>
                    </div>
                    <div id="keyMetadataList" class="metadata-list"></div>
                </div>
            </div>

            <!-- === ВКЛ.2: ЗНАЧЕНИЯ МЕТАДАННЫХ === -->
            <div id="tab-values" class="tab-content">
                <div class="card">
                    <h2>Значения метаданных</h2>
                    <div class="input-group">
                        <label>Ключ:</label>
                        <select id="keySelectForValue"></select>
                    </div>
                    <div class="input-group">
                        <label>Поиск значений</label>
                        <input type="text" id="valueSearchInput" placeholder="Введите часть значения" onkeyup="APP.searchValues(this.value)">
                    </div>
                    <div class="input-group">
                        <label>Новое значение</label>
                        <input type="text" id="newValueName" placeholder="Новое значение">
                        <button class="btn-success btn-block" onclick="APP.createValueMetadata()">Добавить значение</button>
                    </div>
                    <div id="valueMetadataList" class="metadata-list"></div>
                </div>
            </div>

            <!-- === ВКЛ.1: ФАЙЛЫ В БД === -->
            <div id="tab-files" class="tab-content">
                <div class="card">
                    <h2>Файлы в БД</h2>
                    <div class="filter-block">
                        <h3 style="margin-top: 0;">Фильтры</h3>
                        <div class="search-input-group">
                            <label style="min-width: 90px; display: block; color: var(--text-secondary);">От (UTC)</label>
                            <input type="datetime-local" id="searchDateFrom">
                        </div>
                        <div class="search-input-group">
                            <label style="min-width: 90px; display: block; color: var(--text-secondary);">До (UTC)</label>
                            <input type="datetime-local" id="searchDateTo">
                        </div>
                        <div class="search-input-group">
                            <select id="searchTagType" style="flex: 1; min-width: 150px;"></select>
                            <input type="text" id="searchTagCat" placeholder="Часть имени">
                            <button class="btn-small" onclick="APP.addSearchTag()">Добавить</button>
                        </div>
                        <div id="activeSearchTags" style="margin-top: 12px;"></div>
                        <button class="btn-large" onclick="APP.searchFiles()">
                            🔍 Применить фильтры
                        </button>
                    </div>
                    <div id="pageInfo" style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px;"></div>
                    <table id="dbFilesTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Имя файла</th>
                                <th>Дата (UTC)</th>
                                <th>Теги</th>
                                <th style="width: 160px;">Действия</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <div class="pagination">
                        <button class="btn-small" onclick="APP.prevPage()">← Назад</button>
                        <span class="page-info">
                            Страница <span id="currentPageNum">1</span>
                        </span>
                        <button class="btn-small" onclick="APP.nextPage()">Вперед →</button>
                    </div>
                </div>
            </div>

            <!-- === ВКЛ.2: ЗАГРУЗКА ФАЙЛА === -->
            <div id="tab-upload" class="tab-content">
                <div class="card">
                    <h2>Загрузка файла с шаблоном</h2>

                    <div class="input-group">
                        <label><strong>Выберите шаблон:</strong></label>
                        <select id="templateSelect"></select>
                    </div>

                    <div class="input-group">
                        <label><strong>Выберите файл:</strong></label>
                        <input type="file" id="fileInput">
                    </div>

                    <div id="templateFieldsContainer" style="display: none;">
                        <div class="card" style="margin-bottom: 16px;">
                            <strong style="display: block; margin-bottom: 12px;">Заполните поля шаблона:</strong>
                            <div id="templateFieldsContent"></div>
                        </div>
                    </div>

                    <button class="btn-success btn-large" id="uploadBtn">
                        Загрузить в Облако и БД
                    </button>
                </div>
            </div>


            <div id="tab-minio" class="tab-content">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h2 style="margin: 0;">Файлы в облаке (MinIO)</h2>
                        <button class="btn-small" onclick="APP.refreshMinioFiles()">🔄 Обновить</button>
                    </div>
                    <ul id="minioFilesList" class="files-list"></ul>
                </div>
            </div>

        </div>
    </div>

    <!-- === ПОДКЛЮЧЕНИЕ СКРИПТОВ === -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
